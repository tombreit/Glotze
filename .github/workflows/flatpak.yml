name: Flatpak

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

# Cancel stale PR and main builds. Tag builds always run to completion so
# release artifacts aren't accidentally dropped.
concurrency:
  group: flatpak-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  build:
    name: flatpak-builder
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - name: Check out
        uses: actions/checkout@v6

      # Flathub's own linter (bundled in the flathub-infra image). Catches
      # manifest/permission problems before the slow build. --gha-format turns
      # findings into inline PR annotations.
      - name: Lint manifest
        run: flatpak-builder-lint --gha-format manifest build-aux/io.github.tombreit.Glotze.yml

      - name: Build flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: glotze.flatpak
          manifest-path: build-aux/io.github.tombreit.Glotze.yml
          # Must match `default-branch:` in the manifest; otherwise the action
          # defaults to `master` and `flatpak build-bundle … stable` fails with
          # "Refspec … not found".
          branch: stable
          # Mirror AppStream screenshots into the OSTree (a `screenshots/<arch>`
          # ref) exactly like Flathub's own build, so the "Lint repo" step below
          # passes its appstream-screenshots-not-mirrored-in-ostree /
          # appstream-external-screenshot-url checks. flatpak-builder downloads
          # the URLs from the metainfo, rewrites them to dl.flathub.org/media and
          # (since 1.4.5) commits the ref automatically. These two errors can't be
          # waived via flathub.json, so mirroring is the only fix.
          mirror-screenshots-url: https://dl.flathub.org/media
          # Runs `meson test` inside the sandbox: appstreamcli validate +
          # desktop-file-validate (the targets in data/meson.build).
          run-tests: true
          cache-key: flatpak-builder-${{ hashFiles('Cargo.lock', 'build-aux/io.github.tombreit.Glotze.yml') }}

      # Lint the built OSTree repo (the same check Flathub runs on submission).
      - name: Lint repo
        run: flatpak-builder-lint --gha-format repo repo

      - name: Attach bundle to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: glotze.flatpak
          generate_release_notes: true
          fail_on_unmatched_files: true
