name: Flatpak

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

# Cancel stale PR builds. Main / tag builds always run to completion so
# release artifacts aren't accidentally dropped.
concurrency:
  group: flatpak-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    name: flatpak-builder
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Build flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: glotze.flatpak
          manifest-path: data/io.github.tombreit.Glotze.yml
          # Must match `default-branch:` in the manifest; otherwise the action
          # defaults to `master` and `flatpak build-bundle … stable` fails with
          # "Refspec … not found".
          branch: stable
          cache-key: flatpak-builder-${{ hashFiles('Cargo.lock', 'data/io.github.tombreit.Glotze.yml') }}

      - name: Attach bundle to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: glotze.flatpak
          generate_release_notes: true
          fail_on_unmatched_files: true
