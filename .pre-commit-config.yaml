# Local pre-commit hooks. Install once with:
#   pipx install pre-commit && pre-commit install
# Then `git commit` automatically runs the checks. Manual run:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Rust toolchain hooks run from your local cargo — no extra installs. The
  # CI workflow runs the same checks on every PR, so this is a "fail fast at
  # commit time" convenience.
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --all-targets --locked -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false
